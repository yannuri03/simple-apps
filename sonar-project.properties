# must be unique in a given SonarQube instance
sonar.projectKey=Simple-Apps

# --- optional properties ---

# defaults to project key
sonar.projectName=simpleapps
# defaults to 'not provided'
sonar.projectVersion=1.0
 
# Path is relative to the sonar-project.properties file. Defaults to .
sonar.sources=.
 
# Encoding of the source code. Default is default system encoding
sonar.sourceEncoding=UTF-8

# Ignore file
sonar.exclusions=app/coverage/**, app/node_modules/**, app/testing/**, app/Dockerfile, docker-compose.yaml

sonar.tests=app/testing/

sonar.javascript.lcov.reportPaths=app/coverage/lcov.info